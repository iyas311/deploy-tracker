{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="glass-card p-5">
            <h2 class="fw-bold mb-2">Edit <span class="gradient-text">Expense</span></h2>
            <p class="text-muted mb-4">Update the details of your transaction below.</p>

            <form action="/edit/{{ expense.id }}" method="post">
                <div class="mb-4">
                    <label class="form-label fw-semibold small text-uppercase">Expense Title</label>
                    <input type="text" name="title" class="form-control" value="{{ expense.title }}" required>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <label class="form-label fw-semibold small text-uppercase">Amount</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light">$</span>
                            <input type="number" step="0.01" name="amount" class="form-control"
                                value="{{ expense.amount }}" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-semibold small text-uppercase">Category</label>
                        <select name="category" class="form-select" required>
                            {% for cat in ["Food", "Transport", "Rent", "Shopping", "Entertainment", "Health", "Other"]
                            %}
                            <option value="{{ cat }}" {% if expense.category==cat %}selected{% endif %}>{{ cat }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold small text-uppercase mb-3">Payment Method</label>
                    <div class="d-flex gap-2">
                        {% for method in ["Cash", "Card", "Online"] %}
                        <input type="radio" class="btn-check" name="payment_method" id="edit_pay_{{ method|lower }}"
                            value="{{ method }}" {% if expense.payment_method==method %}checked{% endif %}
                            autocomplete="off">
                        <label class="btn btn-outline-primary flex-grow-1 py-2" for="edit_pay_{{ method|lower }}">
                            <i
                                class="bi bi-{% if method == 'Cash' %}cash{% elif method == 'Card' %}credit-card{% else %}globe{% endif %} me-1"></i>
                            {{ method }}
                        </label>
                        {% endfor %}
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold small text-uppercase">Date of Transaction</label>
                    <input type="date" name="date" class="form-control" value="{{ expense.date }}" required>
                </div>

                <div class="mb-5">
                    <label class="form-label fw-semibold small text-uppercase">Additional Notes</label>
                    <textarea name="description" class="form-control" rows="3">{{ expense.description }}</textarea>
                </div>

                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-primary flex-grow-1 py-3"><i
                            class="bi bi-check-circle-fill me-2"></i> Save Changes</button>
                    <a href="/" class="btn btn-light px-4 py-3 border" style="border-radius: 14px;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
